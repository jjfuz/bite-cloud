<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}BITE Cloud{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --panel-2: #f8fbff;
            --text: #18212f;
            --muted: #5d6b82;
            --line: #dce4ef;
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --ok: #15803d;
            --ok-bg: #ecfdf3;
            --warn: #b45309;
            --warn-bg: #fff7ed;
            --bad: #b91c1c;
            --bad-bg: #fef2f2;
            --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef3f9 100%);
            color: var(--text);
        }

        .container {
            width: min(1280px, 92%);
            margin: 28px auto 48px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .brand h1 {
            margin: 0 0 6px;
            font-size: 30px;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a,
        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            font-weight: 600;
        }

        .nav a:hover,
        .btn:hover {
            border-color: #bfd0e7;
            background: #fbfdff;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-title {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 34px;
            font-weight: 700;
        }

        .section-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            margin: 0 0 14px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 700;
            font-size: 13px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge.ok {
            color: var(--ok);
            background: var(--ok-bg);
            border-color: #bbf7d0;
        }

        .badge.warn {
            color: var(--warn);
            background: var(--warn-bg);
            border-color: #fed7aa;
        }

        .badge.bad {
            color: var(--bad);
            background: var(--bad-bg);
            border-color: #fecaca;
        }

        .muted {
            color: var(--muted);
        }

        .link-row a,
        .table-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .link-row a:hover,
        .table-link:hover {
            text-decoration: underline;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-block {
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
        }

        .kv {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 10px 14px;
            font-size: 14px;
        }

        .kv div:nth-child(odd) {
            font-weight: 700;
            color: var(--muted);
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 13px;
            line-height: 1.5;
            color: #1e293b;
        }

        details {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fbfdff;
            padding: 12px 14px;
        }

        details summary {
            cursor: pointer;
            font-weight: 700;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .metric-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-grid,
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 680px) {
            .metric-grid {
                grid-template-columns: 1fr;
            }

            .topbar {
                flex-direction: column;
                align-items: start;
            }

            .kv {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="brand">
                <h1>BITE Cloud Dashboard</h1>
                <p>Monitoreo del experimento de reportes precomputados, scheduler, RabbitMQ y snapshots.</p>
            </div>
            <div class="nav">
                <a href="/">Dashboard</a>
                <a href="/admin/">Admin</a>
                <a href="/health/">Health</a>
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
